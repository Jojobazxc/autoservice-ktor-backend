components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: admin123

    TokenResponse:
      type: object
      required:
        - token
        - tokenType
        - expiresInMillis
        - role
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
