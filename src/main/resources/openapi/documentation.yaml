openapi: 3.0.3
info:
  title: API информационной системы автосервиса
  version: 1.0.0
  description: MVP backend API для управления автосервисом

servers:
  - url: http://127.0.0.1:8080
    description: Локальный сервер

tags:
  - name: Клиенты
    description: Операции с клиентами
  - name: Автомобили
    description: Операции с автомобилями
  - name: Мастера
    description: Операции с мастерами
  - name: Услуги
    description: Операции с услугами
  - name: Запчасти
    description: Операции с запчастями
  - name: Заказы
    description: Операции с заказами
  - name: Услуги заказа
    description: Операции с услугами внутри заказа
  - name: Запчасти заказа
    description: Операции с запчастями внутри заказа
  - name: Оплаты
    description: Операции с оплатами заказа

paths:
  /clients:
    get:
      tags:
        - Клиенты
      summary: Получить список всех клиентов
      operationId: getAllClients
      responses:
        '200':
          description: Список клиентов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientResponse'

    post:
      tags:
        - Клиенты
      summary: Создать нового клиента
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: Клиент успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{id}:
    get:
      tags:
        - Клиенты
      summary: Получить клиента по идентификатору
      operationId: getClientById
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор клиента
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Клиент найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          description: Некорректный идентификатор клиента
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Клиент не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Клиенты
      summary: Обновить клиента по идентификатору
      operationId: updateClient
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор клиента
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Клиент успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Клиент не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Клиенты
      summary: Удалить клиента по идентификатору
      operationId: deleteClient
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор клиента
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Клиент успешно удален
        '400':
          description: Некорректный идентификатор клиента
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Клиент не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cars:
    get:
      tags:
        - Автомобили
      summary: Получить список всех автомобилей
      operationId: getAllCars
      responses:
        '200':
          description: Список автомобилей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarResponse'

    post:
      tags:
        - Автомобили
      summary: Создать новый автомобиль
      operationId: createCar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCarRequest'
      responses:
        '201':
          description: Автомобиль успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Клиент не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cars/{id}:
    get:
      tags:
        - Автомобили
      summary: Получить автомобиль по идентификатору
      operationId: getCarById
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор автомобиля
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Автомобиль найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
        '400':
          description: Некорректный идентификатор автомобиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Автомобиль не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Автомобили
      summary: Обновить автомобиль по идентификатору
      operationId: updateCar
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор автомобиля
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCarRequest'
      responses:
        '200':
          description: Автомобиль успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Автомобиль или клиент не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Автомобили
      summary: Удалить автомобиль по идентификатору
      operationId: deleteCar
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор автомобиля
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Автомобиль успешно удален
        '400':
          description: Некорректный идентификатор автомобиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Автомобиль не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{clientId}/cars:
    get:
      tags:
        - Автомобили
      summary: Получить список автомобилей клиента
      operationId: getCarsByClientId
      parameters:
        - name: clientId
          in: path
          required: true
          description: Идентификатор клиента
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Список автомобилей клиента
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarResponse'
        '400':
          description: Некорректный идентификатор клиента
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Клиент не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /masters:
    get:
      tags:
        - Мастера
      summary: Получить список всех мастеров
      operationId: getAllMasters
      responses:
        '200':
          description: Список мастеров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MasterResponse'

    post:
      tags:
        - Мастера
      summary: Создать нового мастера
      operationId: createMaster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMasterRequest'
      responses:
        '201':
          description: Мастер успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MasterResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /masters/{id}:
    get:
      tags:
        - Мастера
      summary: Получить мастера по идентификатору
      operationId: getMasterById
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор мастера
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Мастер найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MasterResponse'
        '400':
          description: Некорректный идентификатор мастера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Мастер не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Мастера
      summary: Обновить мастера по идентификатору
      operationId: updateMaster
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор мастера
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMasterRequest'
      responses:
        '200':
          description: Мастер успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MasterResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Мастер не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Мастера
      summary: Удалить мастера по идентификатору
      operationId: deleteMaster
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор мастера
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Мастер успешно удален
        '400':
          description: Некорректный идентификатор мастера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Мастер не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /services:
    get:
      tags:
        - Услуги
      summary: Получить список всех услуг
      operationId: getAllServices
      parameters:
        - name: id
          in: query
          required: false
          description: Не используется
          schema:
            type: integer
      responses:
        '200':
          description: Список услуг
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceResponse'

    post:
      tags:
        - Услуги
      summary: Создать новую услугу
      operationId: createService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceRequest'
      responses:
        '201':
          description: Услуга успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /services/{id}:
    get:
      tags:
        - Услуги
      summary: Получить услугу по идентификатору
      operationId: getServiceById
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор услуги
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Услуга найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Некорректный идентификатор услуги
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Услуга не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Услуги
      summary: Обновить услугу по идентификатору
      operationId: updateService
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор услуги
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServiceRequest'
      responses:
        '200':
          description: Услуга успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Услуга не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Услуги
      summary: Удалить услугу по идентификатору
      operationId: deleteService
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор услуги
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Услуга успешно удалена
        '400':
          description: Некорректный идентификатор услуги
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Услуга не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /parts:
    get:
      tags:
        - Запчасти
      summary: Получить список всех запчастей
      operationId: getAllParts
      responses:
        '200':
          description: Список запчастей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PartResponse'

    post:
      tags:
        - Запчасти
      summary: Создать новую запчасть
      operationId: createPart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePartRequest'
      responses:
        '201':
          description: Запчасть успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /parts/{id}:
    get:
      tags:
        - Запчасти
      summary: Получить запчасть по идентификатору
      operationId: getPartById
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор запчасти
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Запчасть найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartResponse'
        '400':
          description: Некорректный идентификатор запчасти
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Запчасть не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Запчасти
      summary: Обновить запчасть по идентификатору
      operationId: updatePart
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор запчасти
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePartRequest'
      responses:
        '200':
          description: Запчасть успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Запчасть не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Запчасти
      summary: Удалить запчасть по идентификатору
      operationId: deletePart
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор запчасти
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Запчасть успешно удалена
        '400':
          description: Некорректный идентификатор запчасти
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Запчасть не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders:
    get:
      tags:
        - Заказы
      summary: Получить список заказов
      operationId: getAllOrders
      parameters:
        - name: clientId
          in: query
          required: false
          description: Фильтр по идентификатору клиента
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          required: false
          description: Фильтр по статусу заказа
          schema:
            type: string
            enum:
              - CREATED
              - IN_PROGRESS
              - COMPLETED
              - PAID
              - CANCELED
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Некорректные параметры фильтрации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Заказы
      summary: Создать новый заказ
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Заказ успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Связанная сущность не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{id}:
    get:
      tags:
        - Заказы
      summary: Получить заказ по идентификатору
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор заказа
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Заказ найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Некорректный идентификатор заказа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Заказ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Заказы
      summary: Обновить заказ по идентификатору
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор заказа
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        '200':
          description: Заказ успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Заказ или связанная сущность не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Заказы
      summary: Удалить заказ по идентификатору
      operationId: deleteOrder
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор заказа
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Заказ успешно удален
        '400':
          description: Некорректный идентификатор заказа
          content:
            application/json:
